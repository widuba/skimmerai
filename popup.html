<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Skimmer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 400px;
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
      background: #ffffff;
      color: #111111;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin: 12px 0 6px;
    }

    textarea, button {
      width: 100%;
      box-sizing: border-box;
      font: inherit;
    }

    textarea {
      border: 1px solid #cccccc;
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      resize: vertical;
      min-height: 150px;
    }

    button {
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      background: #111111;
      color: white;
      font-weight: 600;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      min-height: 18px;
    }

    #output {
      margin-top: 12px;
      white-space: pre-wrap;
      border: 1px solid #cccccc;
      border-radius: 8px;
      padding: 10px;
      min-height: 120px;
      background: #fafafa;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Study Skimmer</h1>

  <label for="userText">Paste text to skim</label>
  <textarea id="userText" placeholder="Paste your study text here..."></textarea>

  <button id="skimBtn">Skim Text</button>

  <div id="status"></div>

  <label for="output">Skimmed result</label>
  <div id="output"></div>

  <div class="note">Put your Hugging Face token directly into popup.js.</div>

  <script src="popup.js"></script>
</body>
</html>
